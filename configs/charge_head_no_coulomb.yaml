name: charge_head_no_coulomb
# use_charge=true: charge head is active and trained (charges learned implicitly
# through energy head, no explicit 1/r Coulomb term). This is intentionally
# distinct from local_mace_style — the charge head participates in the forward
# pass and its parameters receive gradients. The freeze block in train.py only
# fires when BOTH use_charge=false AND use_coulomb=false.
use_charge: true
use_coulomb: false
hidden: 64
epochs: 150
lr: 1.0e-3
w_E: 1.0
w_F: 100.0
h5_path: data/transition1x.h5
splits_json: splits.json
batch_size: 32
num_workers: 4

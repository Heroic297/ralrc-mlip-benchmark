name: learned_charge_coulomb
use_charge: true
use_coulomb: true

# Tighter Coulomb stabilization (bug-fix run 3):
# - warmup 5→15: gives local branch 15 epochs to establish force basin
#   before Coulomb Hessian enters at λ=1.0
# - charge_init_scale 1e-4→1e-5: ~10× smaller charges at Coulomb turn-on,
#   further reduces second-order gradient magnitude at λ→1
# - Per-branch grad clipping in train.py (charge branch max_norm=0.1)
#   is the primary fix; these config changes are defence-in-depth.
lambda_coul_warmup_epochs: 15
charge_init_scale: 1.0e-5

hidden: 64
batch_size: 32
num_workers: 0
epochs: 30
lr: 1.0e-3
w_E: 1.0
w_F: 100.0

name: learned_charge_coulomb
use_charge: true
use_coulomb: true

# Root-cause fix: q.detach() in _coulomb_energy (model_clean.py) cuts the
# charge-response force path dq/dh * dh/dR, so the Coulomb Hessian no longer
# diverges during training. Warmup and charge_init_scale are restored to the
# original working values; aggressive settings were compensating for the
# wrong problem.
lambda_coul_warmup_epochs: 5
charge_init_scale: 1.0e-4

hidden: 64
batch_size: 32
num_workers: 0
epochs: 30
lr: 1.0e-3
w_E: 1.0
w_F: 100.0
